<!DOCTYPE html>
<html lang="en">

<head>

            }
        </style>

    </template>

        <canarias-calendar date="2025-12-05"></canarias-calendar>
        <canarias-calendar></canarias-calendar>
        <canarias-calendar></canarias-calendar>
        <canarias-calendar></canarias-calendar>
    </div>

    <script type="module" src="main.js"></script>

</html>
